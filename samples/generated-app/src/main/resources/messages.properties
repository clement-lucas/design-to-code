# Validation messages
jakarta.validation.constraints.NotBlank.message=入力してください。
jakarta.validation.constraints.NotNull.message=入力してください。
jakarta.validation.constraints.Size.message={min}文字以上{max}文字以内で入力してください。
jakarta.validation.constraints.Min.message={value}以上の値を入力してください。
jakarta.validation.constraints.Max.message={value}以下の値を入力してください。
jakarta.validation.constraints.Pattern.message=正しい形式で入力してください。

# Application messages
MSG00001=ログインに失敗しました。ログインIDまたはパスワードが誤っています。
MSG00002=ログアウトしました。
MSG00003=セッションの有効期限が切れました。再度ログインしてください。
MSG00010=条件に一致するプロジェクトがありません。
MSG00011=プロジェクトの登録が完了しました。
MSG00012=プロジェクトの更新が完了しました。
MSG00013=プロジェクトの削除が完了しました。
MSG00020=入力内容にエラーがあります。
MSG00021=プロジェクト名は必須です。
MSG00022=プロジェクト種別は必須です。
MSG00023=プロジェクト分類は必須です。
MSG00024=プロジェクト開始日は必須です。
MSG00025=プロジェクト終了日は必須です。
MSG00026=組織は必須です。
MSG00027=PMは必須です。
MSG00028=PLは必須です。
MSG00030=プロジェクト終了日はプロジェクト開始日より後の日付を入力してください。
MSG00040=ファイルが指定されていません。
MSG00041=ファイルサイズが上限（500KB）を超えています。
