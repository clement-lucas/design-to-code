MSG00050=ダウンロード要求が完了しました。バッチ処理完了後にダウンロード可能になります。
MSG00051=ダウンロード可能なファイルはありません。
MSG00060=排他制御エラーが発生しました。再度操作を行ってください。
MSG00070=アカウントがロックされています。
MSG00071=パスワードの有効期限が切れています。
MSG00080=権限がありません。
MSG00090=システムエラーが発生しました。管理者にお問い合わせください。

