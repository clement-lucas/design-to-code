<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('アップロード')}"></head>
<body>
<nav th:replace="~{fragments/layout :: header}"></nav>
<div class="container">
    <h2>プロジェクト一括登録（アップロード）</h2>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/project/upload/confirm}" th:object="${form}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">CSVファイル <span class="text-danger">*</span></label>
            <input type="file" th:field="*{projectFile}" class="form-control" accept=".csv"/>
            <small class="form-text text-muted">最大500KB。CSV形式のプロジェクトデータファイルを選択してください。</small>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">確認</button>
            <a th:href="@{/}" class="btn btn-secondary">戻る</a>
        </div>
    </form>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
